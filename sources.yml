# sources.yml — Data provenance metadata
# Reference: docs/mcp-infrastructure-blueprint.md §3
# License axis: SE-Statutory-PD (Swedish statutory public domain)
# Statutory basis: Upphovsrättslagen (1960:729) §9 — författningar (laws and
# regulations), beslut av myndighet (decisions of public authorities),
# yttranden av svensk myndighet (official statements of Swedish authorities),
# and official translations of these works enjoy no copyright protection.
# Verified verbatim 2026-05-17.
# Cross-ref: docs/audits/2026-05-17-eu-copyright-statutory-works-batch-3-BG-HR-SK-SI-SE.md
# Catalog entry: infrastructure/attribution-licenses.json → "SE-Statutory-PD"

schema_version: "1.0"
mcp_name: "Swedish Law MCP"
jurisdiction: "SE"

sources:
  - name: "Riksdagen Open Data"
    authority: "Riksdagen (Swedish Parliament)"
    official_portal: "https://data.riksdagen.se/"
    canonical_identifier: "SFS (Svensk forfattningssamling)"
    retrieval_method: "API"
    api_documentation: "https://data.riksdagen.se/data/dokument/"
    update_frequency: "on_change"
    last_ingested: "2026-02-15"
    last_verified: "2026-05-09"
    license_or_terms:
      type: "SE-Statutory-PD"
      url: "https://www.riksdagen.se/sv/dokument-lagar/dokument/svensk-forfattningssamling/lag-1960729-om-upphovsratt-till-litterara-och_sfs-1960-729"
      summary: "Swedish statutory public domain (Upphovsrättslagen 1960:729 §9). Författningar (laws and regulations), beslut av myndighet (decisions of public authorities), yttranden av svensk myndighet (official statements), and official translations enjoy no copyright protection. Statute-level basis on the underlying text; Riksdagen Open Data compilation is additionally redistributable under Swedish PSI regulations."
    coverage:
      scope: "All consolidated Swedish statutes (SFS), including chapters, sections, and provision text"
      limitations: "May lag official publication by 24-48 hours; no editorial annotations or commentary"
    languages:
      - "sv"

  - name: "Lagen.nu"
    authority: "Community-maintained (sources from Domstolsverket)"
    official_portal: "https://lagen.nu/"
    canonical_identifier: "N/A"
    retrieval_method: "RDF"
    api_documentation: "https://lagen.nu/om/rattsinformation.html"
    update_frequency: "weekly"
    last_ingested: "2026-02-15"
    last_verified: "2026-05-09"
    license_or_terms:
      type: "CC-BY Domstolsverket"
      url: "https://lagen.nu/om/rattsinformation.html"
      summary: "Court decisions licensed CC-BY via Domstolsverket; community-maintained aggregation"
    coverage:
      scope: "Swedish court decisions (rattsfall) from HD, HFD, AD and other courts; case summaries and keywords"
      limitations: "Not official; coverage varies by court and time period; volunteer-driven with no SLA"
    languages:
      - "sv"

data_freshness:
  automated_checks: true
  check_frequency: "daily"
  check_workflow: ".github/workflows/check-updates.yml"
  drift_detection_workflow: ".github/workflows/drift-detect.yml"
  last_verified: "2026-02-17"

# Fix-Sweep rebuild contract (chassis corpus freshness automation, 2026-06-10 survey).
# Schema: Ansvar-Architecture-Documentation/infrastructure/policy/rebuild-contract.schema.json
# Runbook: Ansvar-Architecture-Documentation/docs/runbooks/fix-sweep.md
rebuild_contract:
  schema_version: "1.0"
  runnable: true
  ingest_cmd: "npm run ingest:fetch"
  build_cmd: "npm run build:db"
  build_cwd: "."
  premium_build_cmd: "npm run build:db:paid"
  output_db: "data/database.db"
  schema_kind: "statute"
  drift_cmd: "npm run drift:detect"
  golden_hashes: "fixtures/golden-hashes.json"
  node_version: "20"
