name: Republish to GHCR (public)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: swedish-law-mcp

jobs:
  republish:
    name: Re-publish as public
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and re-push
        run: |
          docker pull ${{ env.REGISTRY }}/ansvar-systems/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/ansvar-systems/${{ env.IMAGE_NAME }}:latest
